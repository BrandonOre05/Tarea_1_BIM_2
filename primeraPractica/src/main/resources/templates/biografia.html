<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Datos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
            padding: 20px;
        }

        .contenedor {
            width: 100%;
            max-width: 900px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            text-align: center;
            animation: aparecer 0.6s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .info {
            font-size: 16px;
            color: #334155;
            margin-bottom: 10px;
        }

        ul {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        ul li {
            background: #e0f2fe;
            margin: 6px 0;
            padding: 10px;
            border-radius: 10px;
            color: #0369a1;
            font-weight: 500;
        }

        .imagenes {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .imagenes img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .botones {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .boton {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
        }
    </style>
</head>

<body>
<div class="contenedor">
    <div class="tarjeta">

        <h2 class="titulo">Información Personal</h2>

        <p class="info"><strong>Nombre:</strong> <span th:text="${Nombre}"></span></p>
        <p class="info"><strong>Edad:</strong> <span th:text="${Edad}"></span></p>

        <ul>
            <li th:each="List : ${CosasQueMegustan}" th:text="${List}"></li>
        </ul>

        <div class="imagenes">
            <img th:src="@{/Andric.jpeg}">
            <img th:src="@{/Lacayo.jpg}">
            <img th:src="@{/Barahona.jpg}">
            <img th:src="@{/Efren.jpg}">
            <img th:src="@{/Chenax.jpg}">
            <img th:src="@{/jeanca.jpg}">
            <img th:src="@{/Andric2.jpg}">
            <img th:src="@{/Xavi.jpg}">
            <img th:src="@{/Grupo.jpg}">
            <img th:src="@{/laraDormido.jpg}">
            <img th:src="@{/CaraLara.jpg}">
            <img th:src="@{/FotoPersonal.jpeg}">
        </div>

        <div class="botones">
            <a class="boton" th:href="@{/datos}">Ir a Datos</a>
            <a class="boton" th:href="@{/home}">Ir a Home</a>
            <a class="boton" th:href="@{/usuario}">Ir a Usuario</a>
        </div>

    </div>
</div>
</body>
</html>
